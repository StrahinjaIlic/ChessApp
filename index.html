<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Šahovski Trener</title>
    <style>
        :root{--bs:560px;--sq:70px;--pc:58px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#161512;color:#bababa;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

        header{width:100%;padding:10px 24px;background:#1a1916;border-bottom:1px solid #2b2926;display:flex;align-items:center;gap:10px;flex-shrink:0}
        header .logo{font-size:1.4rem}
        header h1{font-size:1.15rem;color:#e0e0e0;font-weight:600}

        .main{display:flex;gap:20px;padding:16px 24px;width:100%;align-items:flex-start;justify-content:center}

        .player-info{display:flex;align-items:center;gap:8px;padding:5px 2px;font-size:.85rem;min-height:28px;width:calc(var(--bs) + 17px)}
        .player-info .icon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
        .player-info .icon.wi{background:#999}
        .player-info .icon.bi{background:#333;border:1px solid #555}
        .player-info .name{font-weight:600;color:#ccc;font-size:.82rem}
        .player-info .captured{margin-left:auto;font-size:.75rem;letter-spacing:1px;color:#aaa}
        .player-info .adv{color:#bababa;font-weight:600;font-size:.75rem;margin-left:3px}

        .board-sec{flex-shrink:0;flex-grow:0}
        .board-wrap{position:relative;display:flex;gap:0}
        .eval-bar{width:14px;margin-right:3px;border-radius:3px;overflow:hidden;background:#333;position:relative;flex-shrink:0;height:var(--bs)}
        .eval-fill{position:absolute;bottom:0;width:100%;background:#e8e8e8;transition:height .6s ease;height:50%}
        .eval-lbl{position:absolute;width:100%;text-align:center;font-size:.5rem;font-weight:700;z-index:2;pointer-events:none}
        .eval-lbl.top{top:3px;color:#eee}
        .eval-lbl.bot{bottom:3px;color:#333}

        .board{display:grid;grid-template-columns:repeat(8,var(--sq));grid-template-rows:repeat(8,var(--sq));width:var(--bs);height:var(--bs);border-radius:2px;overflow:hidden;user-select:none;-webkit-user-select:none;flex-shrink:0}
        .sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .06s}
        .sq.l{background:#f0d9b5} .sq.d{background:#b58863}
        .sq.sel.l{background:#829769} .sq.sel.d{background:#646d40}
        .sq.lm.l{background:#cdd16a} .sq.lm.d{background:#aaa23a}
        .sq.hf.l,.sq.ht.l{background:#48b5ff;animation:hpulse 1s ease-in-out infinite} .sq.hf.d,.sq.ht.d{background:#2090dd;animation:hpulse 1s ease-in-out infinite}
        @keyframes hpulse{0%,100%{opacity:1}50%{opacity:.7}}
        .hint-box{background:#1a2a3a;border:1px solid #2a5a8a;border-radius:5px;padding:8px 10px;margin-bottom:8px}
        .hint-box .hint-title{font-weight:700;color:#48b5ff;font-size:.78rem;margin-bottom:3px}
        .hint-box .hint-move{font-size:.9rem;color:#e0e0e0;font-weight:700;font-family:'SF Mono',Consolas,monospace}
        .hint-box .hint-why{font-size:.77rem;color:#aaa;margin-top:4px}
        .sq.chk{background:radial-gradient(ellipse at center,rgba(255,0,0,.65) 0%,rgba(200,0,0,.25) 80%,transparent 100%)!important}
        .sq .pc{font-size:var(--pc);line-height:1;z-index:2;pointer-events:none}
        .sq .pc.wp{color:#fff;-webkit-text-stroke:1.2px #333;paint-order:stroke fill;text-shadow:0 1px 4px rgba(0,0,0,.4)}
        .sq .pc.bp{color:#1a1a1a;-webkit-text-stroke:.8px #000;paint-order:stroke fill;text-shadow:none}
        .sq .dot{position:absolute;width:28%;height:28%;border-radius:50%;background:rgba(0,0,0,.12);z-index:3;pointer-events:none}
        .sq .cring{position:absolute;width:86%;height:86%;border-radius:50%;border:5px solid rgba(0,0,0,.12);z-index:3;pointer-events:none}
        .sq .crd{position:absolute;font-size:calc(var(--sq)*0.17);font-weight:700;pointer-events:none;z-index:4}
        .sq .crd-f{right:2px;bottom:1px} .sq .crd-r{left:2px;top:1px}
        .sq.l .crd{color:#b58863} .sq.d .crd{color:#f0d9b5}

        .sidebar{width:420px;flex-shrink:0;flex-grow:0;display:flex;flex-direction:column;gap:8px;align-self:stretch;max-height:calc(var(--bs) + 66px)}
        .pnl{background:#1f1e1b;border-radius:6px;overflow:hidden}
        .pnl-hdr{padding:7px 10px;font-size:.73rem;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #2b2926;display:flex;align-items:center;gap:6px}

        .ctrl-row{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px}
        .btn{padding:5px 10px;border:none;border-radius:4px;background:#2b2926;color:#bababa;font-size:.77rem;cursor:pointer;transition:background .12s;font-weight:500}
        .btn:hover{background:#3b3936;color:#e0e0e0}
        .btn.pri{background:#629924;color:#fff}
        .btn.pri:hover{background:#72a934}
        .btn.retry{background:#c06030;color:#fff}
        .btn.retry:hover{background:#d07040}
        .btn.ai{background:#4a6fa5;color:#fff}
        .btn.ai:hover{background:#5a8fc5}
        .btn.ai.loading{opacity:.6;cursor:wait}
        .ai-box{background:#1a2030;border:1px solid #2a4a7a;border-radius:6px;padding:10px 12px;margin-bottom:10px}
        .ai-box .ai-title{font-weight:700;color:#6a9fd8;font-size:.76rem;margin-bottom:5px;display:flex;align-items:center;gap:5px}
        .ai-box .ai-content{font-size:.8rem;color:#d4d4d4;line-height:1.6;white-space:pre-wrap}
        .ai-box .ai-content strong{color:#7cc35d}
        .ai-box .ai-content em{color:#d4a017;font-style:normal}
        .ai-chat{display:flex;gap:5px;margin-top:8px}
        .ai-chat input{flex:1;padding:6px 8px;background:#141820;border:1px solid #2a4a7a;border-radius:4px;color:#d4d4d4;font-size:.78rem;outline:none}
        .ai-chat input:focus{border-color:#4a6fa5}
        .ai-chat input::placeholder{color:#555}
        .ai-chat button{padding:5px 10px;background:#4a6fa5;color:#fff;border:none;border-radius:4px;font-size:.75rem;cursor:pointer}
        .ai-chat button:hover{background:#5a8fc5}
        .btn:disabled{opacity:.3;cursor:not-allowed}
        .diff-row{padding:4px 10px 8px}
        .diff-row select{width:100%;padding:5px 7px;background:#2b2926;color:#e0e0e0;border:1px solid #3b3936;border-radius:4px;font-size:.8rem;cursor:pointer}

        .status-box{padding:6px 10px;font-size:.83rem;text-align:center;font-weight:500}
        .status-box.yt{color:#629924} .status-box.th{color:#d4a017} .status-box.ck{color:#e55} .status-box.go{color:#f5a623;font-weight:700}
        .think-anim{display:none;align-items:center;justify-content:center;gap:3px;padding:3px 10px;font-size:.76rem;color:#888}
        .think-anim.on{display:flex}
        .think-anim .da{animation:bl 1.4s infinite both}
        .think-anim .da:nth-child(2){animation-delay:.2s}
        .think-anim .da:nth-child(3){animation-delay:.4s}
        @keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}

        .coach-box{overflow-y:auto;padding:8px 10px;font-size:.79rem;line-height:1.5;flex:1}
        .coach-box::-webkit-scrollbar{width:4px}
        .coach-box::-webkit-scrollbar-thumb{background:#3b3936;border-radius:2px}

        .threat-box{background:#3a1a1a;border:1px solid #6b2a2a;border-radius:5px;padding:7px 9px;margin-bottom:8px}
        .threat-box .threat-title{font-weight:700;color:#e55;font-size:.74rem;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
        .threat-box .threat-item{padding:1px 0;font-size:.77rem;color:#f0a0a0}
        .threat-box .threat-item.warn{color:#d4a017}

        .retry-box{background:#3a2a1a;border:1px solid #7a5a2a;border-radius:5px;padding:8px 10px;margin-bottom:8px;text-align:center}
        .retry-box .retry-msg{font-size:.82rem;color:#d4a017;margin-bottom:6px;font-weight:500}
        .retry-box .retry-hint{font-size:.76rem;color:#aaa;margin-bottom:8px}

        .coach-quote{border-left:3px solid #629924;padding:5px 9px;margin-bottom:8px;color:#d4d4d4;background:#22211e;border-radius:0 4px 4px 0;font-size:.8rem}
        .coach-quote.cq-great{border-color:#2a9d2a} .coach-quote.cq-good{border-color:#629924} .coach-quote.cq-ok{border-color:#888} .coach-quote.cq-inac{border-color:#d4a017} .coach-quote.cq-mistake{border-color:#e55} .coach-quote.cq-blunder{border-color:#c00}
        .cq-label{font-weight:700;margin-right:4px}
        .cq-label.great{color:#2a9d2a} .cq-label.good{color:#629924} .cq-label.ok{color:#999} .cq-label.inac{color:#d4a017} .cq-label.mistake{color:#e55} .cq-label.blunder{color:#c00}

        .opening-tag{display:flex;align-items:center;gap:6px;padding:4px 8px;background:#22211e;border-radius:4px;font-size:.74rem;color:#aaa;margin-bottom:6px;border-left:2px solid #629924}
        .opening-tag .opening-name{color:#d4d4d4;font-weight:600}
        .opening-tag .opening-stats{margin-left:auto;display:flex;gap:4px;font-size:.65rem}
        .opening-tag .os-w{color:#e8e8e8} .opening-tag .os-d{color:#999} .opening-tag .os-b{color:#666}

        .coach-phase{font-size:.68rem;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

        .scores-wrap{margin-bottom:8px;padding:4px 0}
        .score-row{display:flex;align-items:center;gap:6px;padding:1.5px 0}
        .score-label{width:90px;font-size:.68rem;color:#888;flex-shrink:0}
        .score-bar{flex:1;height:5px;background:#2b2926;border-radius:3px;overflow:hidden}
        .score-fill{height:100%;border-radius:3px;transition:width .5s ease}
        .score-fill.sf-good{background:#629924} .score-fill.sf-ok{background:#d4a017} .score-fill.sf-bad{background:#e55}
        .score-val{width:38px;font-size:.62rem;color:#777;text-align:right;flex-shrink:0}

        .c-sec{margin-bottom:6px}
        .c-sec-t{font-weight:700;color:#999;font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;display:flex;align-items:center;gap:5px}
        .c-note{padding:1px 0;font-size:.77rem}
        .c-note.good{color:#7cc35d} .c-note.neutral{color:#999} .c-note.warn{color:#d4a017} .c-note.bad{color:#e07}

        .analysis-cols{display:flex;gap:6px;margin-bottom:8px}
        .analysis-col{flex:1;background:#22211e;border-radius:4px;padding:5px 7px;min-width:0}
        .analysis-col-hdr{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;padding-bottom:2px;border-bottom:1px solid #2b2926}
        .analysis-col-hdr.mine{color:#629924}
        .analysis-col-hdr.opp{color:#d4a017}
        .analysis-col .c-note{font-size:.73rem}

        .explorer-box{background:#22211e;border-radius:4px;padding:5px 7px;margin-bottom:8px}
        .explorer-title{font-size:.66rem;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
        .explorer-moves{display:flex;flex-direction:column;gap:2px}
        .explorer-mv{display:flex;align-items:center;gap:6px;font-size:.74rem;padding:1px 0}
        .explorer-mv .em-san{font-weight:600;color:#d4d4d4;width:36px;font-family:'SF Mono',Consolas,monospace}
        .explorer-mv .em-bar{flex:1;height:10px;display:flex;border-radius:2px;overflow:hidden}
        .em-bar-w{background:#e8e8e8;height:100%} .em-bar-d{background:#888;height:100%} .em-bar-b{background:#444;height:100%}
        .explorer-mv .em-n{font-size:.62rem;color:#777;width:36px;text-align:right}

        .tb-box{background:#1a2a1a;border:1px solid #2a5a2a;border-radius:4px;padding:6px 8px;margin-bottom:8px;font-size:.78rem}
        .tb-box.tb-loss{background:#3a1a1a;border-color:#6b2a2a}
        .tb-box.tb-draw{background:#2a2a1a;border-color:#5a5a2a}
        .tb-box .tb-title{font-size:.66rem;color:#666;text-transform:uppercase;letter-spacing:.3px}
        .tb-box .tb-result{font-weight:700;margin-top:2px}
        .tb-box .tb-result.tw{color:#7cc35d} .tb-box .tb-result.td{color:#d4a017} .tb-box .tb-result.tl{color:#e55}
        .tb-box .tb-move{font-size:.74rem;color:#aaa;margin-top:2px}

        .pv-box{background:#22211e;border-radius:4px;padding:5px 7px;margin-bottom:8px;font-family:'SF Mono','Cascadia Code',Consolas,monospace}
        .pv-title{font-size:.66rem;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
        .pv-line{font-size:.76rem;color:#aaa;word-break:break-all}
        .pv-eval{font-size:.72rem;color:#629924;font-weight:600;margin-left:4px}

        .c-plan{list-style:none;padding:0;margin-top:3px}
        .c-plan li{padding:2px 0 2px 14px;position:relative;font-size:.77rem;color:#ccc}
        .c-plan li::before{content:'\25B8';position:absolute;left:0;color:#629924}

        .moves-box{overflow-y:auto;max-height:100px;flex-shrink:0}
        .moves-box::-webkit-scrollbar{width:4px}
        .moves-box::-webkit-scrollbar-thumb{background:#3b3936;border-radius:2px}
        .mv-grid{display:grid;grid-template-columns:26px 1fr 1fr;padding:4px 7px;gap:1px 0;font-size:.78rem;font-family:'SF Mono','Cascadia Code',Consolas,monospace}
        .mv-n{color:#555;text-align:right;padding-right:5px;padding-top:1px;padding-bottom:1px}
        .mv{padding:1px 4px;border-radius:3px;cursor:pointer;color:#bababa}
        .mv:hover{background:#2b2926}
        .mv.cur{background:#2b2926;color:#e0e0e0;font-weight:600}

        .promo-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
        .promo-ov.on{display:flex}
        .promo-dlg{background:#262421;border-radius:10px;padding:16px 18px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)}
        .promo-dlg h3{margin-bottom:12px;color:#e0e0e0;font-size:.95rem}
        .promo-opts{display:flex;gap:7px}
        .promo-o{width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:36px;background:#f0d9b5;border-radius:6px;cursor:pointer;transition:all .12s;border:2px solid transparent}
        .promo-o:hover{background:#829769;border-color:#629924}

        .tactic-box{background:#1a2a2a;border:1px solid #2a6b5a;border-radius:5px;padding:7px 9px;margin-bottom:8px}
        .tactic-box .tactic-title{font-weight:700;color:#48b5a0;font-size:.74rem;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
        .tactic-box .tactic-item{padding:2px 0;font-size:.77rem;color:#a0e0d0}
        .tactic-box .tactic-item.opp{color:#e5a0a0}
        .hint-candidate{padding:4px 0;border-bottom:1px solid #1a3a5a}
        .hint-candidate:last-child{border-bottom:none}
        .hint-candidate.best{background:#1a2a3a;border-radius:3px;padding:4px 6px;margin:-2px -6px}
        .hint-rank{color:#48b5ff;font-weight:700;font-size:.82rem}
        .hint-eval{color:#629924;font-family:'SF Mono',Consolas,monospace;font-size:.78rem;font-weight:600;margin-left:4px}
        .arrow-svg{position:absolute;top:0;left:17px;pointer-events:none;z-index:10}

        @media(max-width:960px){
            .main{flex-direction:column;align-items:center;padding:10px;gap:10px}
            .sidebar{width:100%;max-width:calc(var(--bs) + 17px);max-height:none}
            .coach-box{max-height:350px}
            .moves-box{max-height:80px}
            .analysis-cols{flex-direction:column}
            .player-info{width:auto;max-width:calc(var(--bs) + 17px)}
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">&#9822;</span>
        <h1>&#352;ahovski Trener</h1>
    </header>

    <div class="main">
        <div class="board-sec">
            <div class="player-info" id="p-top">
                <div class="icon bi">S</div>
                <span class="name">Stockfish</span>
                <span class="captured" id="cap-top"></span>
                <span class="adv" id="adv-top"></span>
            </div>
            <div class="board-wrap">
                <div class="eval-bar"><div class="eval-fill" id="ev-fill"></div><div class="eval-lbl top" id="ev-top"></div><div class="eval-lbl bot" id="ev-bot"></div></div>
                <div class="board" id="board"></div>
            </div>
            <div class="player-info" id="p-bot">
                <div class="icon wi">T</div>
                <span class="name">Ti</span>
                <span class="captured" id="cap-bot"></span>
                <span class="adv" id="adv-bot"></span>
            </div>
        </div>

        <div class="sidebar">
            <div class="pnl">
                <div class="ctrl-row">
                    <button class="btn pri" id="btn-new">Nova igra</button>
                    <button class="btn" id="btn-undo">&larr; Vrati</button>
                    <button class="btn" id="btn-hint">Hint</button>
                    <button class="btn ai" id="btn-explain">Objasni</button>
                    <button class="btn" id="btn-flip">&updownarrow;</button>
                </div>
                <div class="diff-row">
                    <select id="sel-diff">
                        <option value="0">Po&#269;etnik (Elo ~800)</option>
                        <option value="3">Lako (Elo ~1000)</option>
                        <option value="6">Srednje-lako (Elo ~1200)</option>
                        <option value="10" selected>Srednje (Elo ~1500)</option>
                        <option value="14">Te&#353;ko (Elo ~1800)</option>
                        <option value="18">Veoma te&#353;ko (Elo ~2200)</option>
                        <option value="20">Majstor (Elo ~2500+)</option>
                    </select>
                </div>
            </div>

            <div class="pnl">
                <div class="status-box yt" id="status">Tvoj potez</div>
                <div class="think-anim" id="think">Stockfish razmi&#353;lja<span class="da">.</span><span class="da">.</span><span class="da">.</span></div>
            </div>

            <div class="pnl" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
                <div class="pnl-hdr">&#9823; Trener</div>
                <div class="coach-box" id="coach"></div>
            </div>

            <div class="pnl" style="display:flex;flex-direction:column;min-height:0;flex-shrink:0">
                <div class="pnl-hdr">Potezi</div>
                <div class="moves-box"><div class="mv-grid" id="mv-grid"></div></div>
            </div>
        </div>
    </div>

    <div class="promo-ov" id="promo-ov">
        <div class="promo-dlg">
            <h3>Izaberi figuru</h3>
            <div class="promo-opts" id="promo-opts"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script>
    (function(){
    'use strict';

    var P_UNI={wK:'\u265A\uFE0E',wQ:'\u265B\uFE0E',wR:'\u265C\uFE0E',wB:'\u265D\uFE0E',wN:'\u265E\uFE0E',wP:'\u265F\uFE0E',bK:'\u265A\uFE0E',bQ:'\u265B\uFE0E',bR:'\u265C\uFE0E',bB:'\u265D\uFE0E',bN:'\u265E\uFE0E',bP:'\u265F\uFE0E'};
    var PVAL={p:1,n:3,b:3,r:5,q:9,k:0};
    var FILES='abcdefgh';
    var DMAP={0:1,3:3,6:5,10:10,14:13,18:16,20:20};
    var CENTER=[{r:3,c:3},{r:3,c:4},{r:4,c:3},{r:4,c:4}];
    var XCENTER=[{r:2,c:2},{r:2,c:3},{r:2,c:4},{r:2,c:5},{r:3,c:2},{r:3,c:5},{r:4,c:2},{r:4,c:5},{r:5,c:2},{r:5,c:3},{r:5,c:4},{r:5,c:5}];
    var PN={p:'Pe\u0161ak',n:'Konj',b:'Lovac',r:'Top',q:'Dama',k:'Kralj'};

    // Opening DB
    var ODB=[
        {m:'e4',n:'Kraljeva pe\u0161a\u010Dka'},{m:'d4',n:'Damina pe\u0161a\u010Dka'},{m:'c4',n:'Engleska partija'},{m:'Nf3',n:'Retijevo otvaranje'},
        {m:'e4 e5',n:'Otvorena igra'},{m:'e4 c5',n:'Sicilijanska odbrana'},{m:'e4 e6',n:'Francuska odbrana'},{m:'e4 c6',n:'Karo-Kan odbrana'},
        {m:'e4 d5',n:'Skandinavska odbrana'},{m:'e4 d6',n:'Pirc odbrana'},{m:'e4 Nf6',n:'Aljehinova odbrana'},{m:'e4 g6',n:'Moderna odbrana'},
        {m:'d4 d5',n:'Zatvorena igra'},{m:'d4 Nf6',n:'Indijska odbrana'},{m:'d4 f5',n:'Holandska odbrana'},

            var cpM2=line.match(/\bscore cp (-?\d+)/),mtM2=line.match(/\bscore mate (-?\d+)/);
            if(mpvM&&dM2&&pvM2){
                var pi=parseInt(mpvM[1]),dd=parseInt(dM2[1]),sv=0,im=false;
                if(cpM2)sv=parseInt(cpM2[1]);
                if(mtM2){sv=parseInt(mtM2[1]);im=true}
                if(game.turn()==='b')sv=-sv;
                var ex=multiPVResults.find(function(r){return r.pvIndex===pi});
                if(!ex||dd>=ex.depth){
                    if(ex){ex.pv=pvM2[1];ex.score=sv;ex.depth=dd;ex.isMate=im}
                    else multiPVResults.push({pvIndex:pi,pv:pvM2[1],score:sv,depth:dd,isMate:im})
                }
            }

            var m=line.match(/\bscore cp (-?\d+)/);

            m=line.match(/\bscore mate (-?\d+)/);

            var dM=line.match(/\bdepth\s+(\d+)/),pvM=line.match(/\bpv\s+(.+)$/);
            if(dM&&pvM){var d=parseInt(dM[1]);if(d>=pvDepth){pvDepth=d;currentPV=pvM[1]}}
        }

    }

    // Move handling

                canRetry=true;

            }
            if(!best||best==='(none)'){afterMove();return}
            var f=best.substring(0,2),t=best.substring(2,4),pr=best.length>4?best[4]:undefined;

    // PV to SAN
    function pvToSAN(pvStr,max){
        if(!pvStr)return'';var moves=pvStr.trim().split(/\s+/),temp=new Chess(game.fen()),san=[];
        for(var i=0;i<Math.min(moves.length,max||8);i++){
            var m2=moves[i];if(m2.length<4)break;
            try{var mv=temp.move({from:m2.substring(0,2),to:m2.substring(2,4),promotion:m2.length>4?m2[4]:undefined});if(!mv)break;san.push(mv.san)}catch(e){break}
        }
        if(san.length===0)return'';
        var fen=game.fen(),turnC=fen.split(' ')[1],mNum=parseInt(fen.split(' ')[5]),res='',ct=turnC;
        for(var j=0;j<san.length;j++){
            if(ct==='w'){res+=mNum+'.'+san[j]+' ';ct='b'}
            else{if(j===0)res+=mNum+'...';res+=san[j]+' ';ct='w';mNum++}
        }
        return res.trim();
    }

    // Threat detection with strategic explanations
    function detectAllThreats(){
        threats=[];threatDetails=[];
        if(game.game_over()||game.turn()!==playerColor)return;
        var fen=game.fen(),parts=fen.split(' ');
        parts[1]=opp(playerColor);parts[3]='-';
        var brd=game.board();
        try{
            var tg=new Chess(parts.join(' '));
            var opMoves=tg.moves({verbose:true}),caps=opMoves.filter(function(m2){return m2.captured});
            var tmap={};
            caps.forEach(function(m2){if(!tmap[m2.to])tmap[m2.to]={piece:m2.captured,attackers:[]};tmap[m2.to].attackers.push({piece:m2.piece,from:m2.from})});
            var myMoves=game.moves({verbose:true});
            var threatened=[];
            for(var sq in tmap){
                var t=tmap[sq],pv=PVAL[t.piece]||0;if(pv===0)continue;
                var minAV=999,minAttacker=null;
                t.attackers.forEach(function(a){if(PVAL[a.piece]<minAV){minAV=PVAL[a.piece];minAttacker=a}});
                // Simulate capture and check if we can recapture
                var canRecap=false;
                try{
                    var simParts=fen.split(' ');simParts[1]=opp(playerColor);simParts[3]='-';
                    var simG=new Chess(simParts.join(' '));
                    var capM=simG.moves({verbose:true}).filter(function(m2){return m2.from===minAttacker.from&&m2.to===sq});
                    if(capM.length>0){simG.move(capM[0]);canRecap=simG.moves({verbose:true}).some(function(m2){return m2.to===sq})}
                }catch(e2){}
                var canEvade=myMoves.some(function(m2){return m2.from===sq});
                // Skip if attacker is worth >= target and piece can evade or is defended
                if(minAV>=pv&&(canEvade||canRecap))continue;
                // Build detailed threat info
                var ti={sq:sq,piece:t.piece,pieceVal:pv,attackers:t.attackers,minAV:minAV,minAttacker:minAttacker,canRecap:canRecap,canEvade:canEvade};
                // What is attacking it?
                var attackerDesc=t.attackers.map(function(a){return PN[a.piece]+' sa '+a.from}).join(', ');
                if(!canRecap&&!canEvade){
                    ti.sev='bad';
                    ti.text=PN[t.piece]+' na '+sq+' je zarobljen! Napadnut od: '+attackerDesc+'. Ne mo\u017Ee pobeći niti biti odbranjen \u2014 gubi\u0161 '+pv+' poena materijala.';
                }else if(!canRecap&&canEvade){
                    ti.sev=pv>=3?'bad':'warn';
                    ti.text=PN[t.piece]+' na '+sq+' je napadnut od '+attackerDesc+'.';
                    // Suggest where to go
                    var escapes=myMoves.filter(function(m2){return m2.from===sq});
                    if(escapes.length>0){
                        // Find constructive retreats (captures, center squares, defensive)
                        var bestEsc=escapes.filter(function(m2){return m2.captured});
                        if(bestEsc.length===0)bestEsc=escapes.filter(function(m2){var tc=s2c(m2.to);return CENTER.some(function(cs){return cs.r===tc.r&&cs.c===tc.c})||XCENTER.some(function(cs){return cs.r===tc.r&&cs.c===tc.c})});
                        if(bestEsc.length===0)bestEsc=escapes;
                        ti.text+=' Mo\u017Ee pobe\u0107i na: '+bestEsc.slice(0,3).map(function(m2){return m2.to}).join(', ')+'.';
                    }
                    if(minAV<pv)ti.text+=' Protivnik koristi manje vrednu figuru ('+PN[minAttacker.piece]+' = '+minAV+') da napada tvoju vredniju ('+PN[t.piece]+' = '+pv+') \u2014 mora\u0161 reagovati!';
                }else if(canRecap&&minAV<pv){
                    ti.sev='warn';
                    ti.text='Protivnik preti razmenom na '+sq+': '+PN[minAttacker.piece]+' ('+minAV+') uzima tvog '+PN[t.piece]+' ('+pv+'). Iako mo\u017Ee\u0161 uzvratiti, gubi\u0161 na materijalu. Bolje pomeri figuru.';
                }else{
                    continue; // well defended, not a real threat
                }
                threatened.push(ti);
            }
            // Sort by severity and value (most valuable threatened first)
            threatened.sort(function(a,b){
                if(a.sev==='bad'&&b.sev!=='bad')return-1;
                if(b.sev==='bad'&&a.sev!=='bad')return 1;
                return b.pieceVal-a.pieceVal;
            });
            // If multiple pieces threatened, add strategic advice
            if(threatened.length>=2){
                var totalVal=0;threatened.forEach(function(t2){totalVal+=t2.pieceVal});
                var canSaveBothInOne=false;
                // Check if one move saves multiple threats
                var pieceSqs=threatened.map(function(t2){return t2.sq});
                myMoves.forEach(function(m2){
                    if(pieceSqs.indexOf(m2.from)>=0){
                        // This move saves one piece. Does it also defend the other?
                        // Simplified check: if it's a capture that solves things
                    }
                });
                threats.push({
                    text:threatened.length+' figure su pod pretnjom (ukupno '+totalVal+' poena)! Prioritet: spasi najvredniju figuru prvo. Razmisli da li jednim potezom mo\u017Ee\u0161 re\u0161iti obe pretnje.',
                    sev:'bad'
                });
            }
            // Store detailed threat info for AI prompt
            threatened.forEach(function(ti){
                var escSqs=myMoves.filter(function(m2){return m2.from===ti.sq}).map(function(m2){return m2.to});
                threatDetails.push({sq:ti.sq,piece:ti.piece,pieceName:PN[ti.piece],pieceVal:ti.pieceVal,attackers:ti.attackers.map(function(a){return{piece:PN[a.piece],from:a.from}}),escapes:escSqs,canRecap:ti.canRecap,canEvade:ti.canEvade,sev:ti.sev});
            });
            // Add individual threats
            threatened.forEach(function(ti){threats.push({text:ti.text,sev:ti.sev})});
        }catch(e){}
    }

    // Positional Analysis
    function findIsolated(pawns){return pawns.filter(function(p){return!pawns.some(function(o){return o!==p&&Math.abs(o.col-p.col)===1})})}
    function findDoubled(pawns){var fc={};pawns.forEach(function(p){fc[p.col]=(fc[p.col]||0)+1});var res=[];for(var c in fc)if(fc[c]>1)res.push({file:FILES[parseInt(c)],count:fc[c]});return res}
    function findPassed(brd,pawns,color){
        return pawns.filter(function(p){
            var dir=color==='w'?-1:1,end=color==='w'?0:7;
            for(var r=p.row+dir;color==='w'?r>=end:r<=end;r+=dir)for(var dc=-1;dc<=1;dc++){var c=p.col+dc;if(c<0||c>7)continue;var sq=brd[r][c];if(sq&&sq.type==='p'&&sq.color!==color)return false}
            return true;
        });
    }
    function findBackward(brd,pawns,color){
        return pawns.filter(function(p){
            var hasSup=pawns.some(function(o){if(o===p||Math.abs(o.col-p.col)!==1)return false;return color==='w'?o.row<=p.row:o.row>=p.row});
            if(hasSup)return false;
            var advR=color==='w'?p.row-1:p.row+1;if(advR<0||advR>7)return false;
            for(var dc=-1;dc<=1;dc+=2){var ac=p.col+dc;if(ac<0||ac>7)continue;var atkR=color==='w'?advR+1:advR-1;if(atkR>=0&&atkR<=7&&brd[atkR][ac]&&brd[atkR][ac].type==='p'&&brd[atkR][ac].color!==color)return true}
            return false;
        });
    }
    function analyzePawns(brd,pieces,pc){
        var my=pieces[pc].filter(function(p){return p.type==='p'}),op=pieces[opp(pc)].filter(function(p){return p.type==='p'}),notes=[];
        findIsolated(my).forEach(function(p){notes.push({t:'Izolovani pe\u0161ak na '+p.sq,c:'warn'})});
        findIsolated(op).forEach(function(p){notes.push({t:'Protivnik: izolovan pe\u0161ak na '+p.sq+' \u2014 napadni!',c:'good'})});
        findDoubled(my).forEach(function(d){notes.push({t:'Udvostru\u010Deni pe\u0161aci na '+d.file+'-liniji',c:'warn'})});
        findBackward(brd,my,pc).forEach(function(p){notes.push({t:'Zaostali pe\u0161ak na '+p.sq,c:'warn'})});
        findBackward(brd,op,opp(pc)).forEach(function(p){notes.push({t:'Protivnik: zaostali pe\u0161ak na '+p.sq,c:'good'})});
        var myPass=findPassed(brd,my,pc);
        myPass.forEach(function(p){var rk=pc==='w'?8-p.row:p.row+1;notes.push({t:'Slobodni pe\u0161ak na '+p.sq+(rk>=6?' \u2014 blizu promocije!':' \u2014 guraj!'),c:'good'})});
        var opPass=findPassed(brd,op,opp(pc));
        opPass.forEach(function(p){notes.push({t:'Protivnik: slobodni pe\u0161ak na '+p.sq+' \u2014 blokiraj!',c:'bad'})});
        if(notes.length===0)notes.push({t:'Zdrava pe\u0161a\u010Dka struktura.',c:'neutral'});
        return{notes:notes,myIso:findIsolated(my),opIso:findIsolated(op),myPass:myPass,opPass:opPass};
    }
    function analyzeDev(pieces,pc){
        var backR=pc==='w'?7:0,minors=pieces[pc].filter(function(p){return p.type==='n'||p.type==='b'});
        var dev=minors.filter(function(p){return p.row!==backR}),undev=minors.filter(function(p){return p.row===backR});
        var king=pieces[pc].find(function(p){return p.type==='k'});
        var castled=king&&((pc==='w'&&(king.sq==='g1'||king.sq==='c1'))||(pc==='b'&&(king.sq==='g8'||king.sq==='c8')));
        var onStart=king&&((pc==='w'&&king.sq==='e1')||(pc==='b'&&king.sq==='e8'));
        var notes=[];
        if(minors.length>0)notes.push({t:'Razvoj: '+dev.length+'/'+minors.length+' lakih figura.',c:dev.length>=minors.length?'good':(dev.length>=2?'neutral':'warn')});
        if(undev.length>0)notes.push({t:'Treba razviti: '+undev.map(function(p){return PN[p.type]+' '+p.sq}).join(', '),c:'warn'});
        if(castled)notes.push({t:'Rokada obavljena.',c:'good'});

        if(dev.length>oD.length+1)notes.push({t:'Prednost u razvoju \u2014 iskoristi tempo!',c:'good'});
        if(oD.length>dev.length+1)notes.push({t:'Protivnik je bolje razvijen!',c:'bad'});
        return{notes:notes,developed:dev.length,total:minors.length,castled:castled,undev:undev};
    }
    function analyzeKing(brd,pieces,pc){
        var king=pieces[pc].find(function(p){return p.type==='k'});if(!king)return{notes:[],castled:false};
        var notes=[],castled=(pc==='w'&&(king.sq==='g1'||king.sq==='c1'))||(pc==='b'&&(king.sq==='g8'||king.sq==='c8'));
        if(castled){
            var shR=pc==='w'?king.row-1:king.row+1,shield=0;
            for(var dc=-1;dc<=1;dc++){var c=king.col+dc;if(c<0||c>7)continue;if(shR>=0&&shR<=7&&brd[shR][c]&&brd[shR][c].type==='p'&&brd[shR][c].color===pc)shield++}
            if(shield>=3)notes.push({t:'Odli\u010Dan pe\u0161a\u010Dki \u0161tit.',c:'good'});
            else if(shield>=2)notes.push({t:'Pe\u0161a\u010Dki \u0161tit ima rupu.',c:'warn'});
            else notes.push({t:'Slab pe\u0161a\u010Dki \u0161tit!',c:'bad'});
        }
        for(var dc2=-1;dc2<=1;dc2++){var c2=king.col+dc2;if(c2<0||c2>7)continue;if(fileOpen(brd,c2)){notes.push({t:'Otvorena linija blizu kralja!',c:'warn'});break}}
        var opH=pieces[opp(pc)].filter(function(p){return p.type==='q'||p.type==='r'||p.type==='b'||p.type==='n'});

    function analyzeCenter(brd,pieces,pc){
        var wC=0,bC=0;
        CENTER.forEach(function(sq){var p=brd[sq.r][sq.c];if(p&&p.type==='p'){if(p.color==='w')wC+=3;else bC+=3}else if(p){if(p.color==='w')wC+=1;else bC+=1}});
        pieces.w.filter(function(p){return p.type==='p'}).forEach(function(p){CENTER.forEach(function(sq){if(sq.r===p.row-1&&Math.abs(sq.c-p.col)===1)wC+=2})});
        pieces.b.filter(function(p){return p.type==='p'}).forEach(function(p){CENTER.forEach(function(sq){if(sq.r===p.row+1&&Math.abs(sq.c-p.col)===1)bC+=2})});
        pieces.w.filter(function(p){return p.type==='n'}).forEach(function(p){if(CENTER.some(function(sq){return sq.r===p.row&&sq.c===p.col}))wC+=2});
        pieces.b.filter(function(p){return p.type==='n'}).forEach(function(p){if(CENTER.some(function(sq){return sq.r===p.row&&sq.c===p.col}))bC+=2});
        var my=pc==='w'?wC:bC,op=pc==='w'?bC:wC,notes=[];
        if(my>op+3)notes.push({t:'Sna\u017Ena kontrola centra!',c:'good'});
        else if(my>op+1)notes.push({t:'Dobra kontrola centra.',c:'good'});
        else if(op>my+3)notes.push({t:'Protivnik dominira centrom!',c:'bad'});
        else if(op>my+1)notes.push({t:'Protivnik ima vi\u0161e centra.',c:'warn'});
        else notes.push({t:'Centar je uravnote\u017Een.',c:'neutral'});
        return{notes:notes,my:my,op:op};

    function analyzeActivity(brd,pieces,pc,phase){
        var notes=[],rooks=pieces[pc].filter(function(p){return p.type==='r'}),bishops=pieces[pc].filter(function(p){return p.type==='b'}),knights=pieces[pc].filter(function(p){return p.type==='n'});
        var opBishops=pieces[opp(pc)].filter(function(p){return p.type==='b'});
        // Rook analysis: skip in opening (rooks rarely active)
        if(phase!=='opening'){
            rooks.forEach(function(r){if(fileOpen(brd,r.col))notes.push({t:'Top '+r.sq+' na otvorenoj liniji!',c:'good'});else if(fileSemiOpen(brd,r.col,pc))notes.push({t:'Top '+r.sq+' na polu-otvorenoj liniji.',c:'neutral'})});
            var sevR=pc==='w'?1:6;rooks.forEach(function(r){if(r.row===sevR)notes.push({t:'Top '+r.sq+' na 7. redu!',c:'good'})});
        }
        // Bishop pair: only mention when opponent has lost a bishop
        if(bishops.length===2&&opBishops.length<2)notes.push({t:'Par lovaca \u2014 prednost u otvorenim pozicijama!',c:'good'});
        // Bad bishop: only in middlegame+ when pawn structure is established
        if(phase!=='opening'){
            bishops.forEach(function(b){var bSC=(b.row+b.col)%2,myP=pieces[pc].filter(function(p){return p.type==='p'});if(myP.filter(function(p){return(p.row+p.col)%2===bSC}).length>=4)notes.push({t:'Lovac '+b.sq+' blokiran pe\u0161acima.',c:'warn'})});
        }
        // Knight activity
        knights.forEach(function(n){
            var backR=pc==='w'?7:0;
            if(n.row===backR)return; // skip undeveloped knights, handled by analyzeDev
            if(n.col===0||n.col===7)notes.push({t:'Konj '+n.sq+' na ivici!',c:'warn'});
            else if(CENTER.some(function(sq){return sq.r===n.row&&sq.c===n.col}))notes.push({t:'Konj '+n.sq+' centralizovan!',c:'good'});
        });
        // Back rank mate: only in middlegame+ when opponent has castled and we have attacking pieces
        if(phase!=='opening'){
            var opK=pieces[opp(pc)].find(function(p){return p.type==='k'});
            var opCastled=opK&&((opp(pc)==='w'&&(opK.sq==='g1'||opK.sq==='c1'||opK.sq==='h1'||opK.sq==='b1'))||(opp(pc)==='b'&&(opK.sq==='g8'||opK.sq==='c8'||opK.sq==='h8'||opK.sq==='b8')));
            if(opK&&opCastled){
                var obR=opp(pc)==='w'?7:0,eD=opp(pc)==='w'?-1:1,eR=opK.row+eD,bl=0;
                for(var ed=-1;ed<=1;ed++){var ec=opK.col+ed;if(ec<0||ec>7)continue;if(eR>=0&&eR<=7&&brd[eR][ec]&&brd[eR][ec].color===opp(pc))bl++}
                if(bl>=2&&(rooks.length>0||pieces[pc].some(function(p){return p.type==='q'})))
                    notes.push({t:'Protivnikov kralj zarobljen na zadnjem redu \u2014 mat mogu\u0107!',c:'good'});
            }
        }
        return{notes:notes};
    }
    function analyzeSpace(brd,pieces,pc){
        var myS=0,opS=0;
        pieces[pc].filter(function(p){return p.type==='p'}).forEach(function(p){if((pc==='w'&&p.row<4)||(pc==='b'&&p.row>=4))myS++});
        pieces[opp(pc)].filter(function(p){return p.type==='p'}).forEach(function(p){if((opp(pc)==='w'&&p.row<4)||(opp(pc)==='b'&&p.row>=4))opS++});

    function analyzeTactics(brd,pieces,pc){

    var PH_N={opening:'Otvaranje',middlegame:'Sredina igre',endgame:'Zavr\u0161nica'};
